name: build-and-push

# TEMP: inspect the base image's entrypoint + startup script so we can wrap it
# for persistence. Revert to the build-push job once we know the startup flow.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Pull base image
        run: docker pull thelocallab/hunyuan3d-2.1-comfyui:latest

      - name: Show entrypoint / cmd
        run: |
          echo "===== ENTRYPOINT ====="
          docker inspect --format '{{json .Config.Entrypoint}}' thelocallab/hunyuan3d-2.1-comfyui:latest
          echo "===== CMD ====="
          docker inspect --format '{{json .Config.Cmd}}' thelocallab/hunyuan3d-2.1-comfyui:latest
          echo "===== WORKDIR ====="
          docker inspect --format '{{.Config.WorkingDir}}' thelocallab/hunyuan3d-2.1-comfyui:latest
          echo "===== ENV ====="
          docker inspect --format '{{json .Config.Env}}' thelocallab/hunyuan3d-2.1-comfyui:latest

      - name: Dump /app/start.sh and any scripts it references
        run: |
          cid=$(docker create thelocallab/hunyuan3d-2.1-comfyui:latest)
          echo "===== /app/start.sh ====="
          docker cp "$cid:/app/start.sh" ./start.sh && cat ./start.sh
          echo "===== ls -la /app ====="
          docker cp "$cid:/app" ./appdir 2>/dev/null && ls -la ./appdir | head -50
          echo "===== other .sh in /app ====="
          find ./appdir -maxdepth 2 -name "*.sh" 2>/dev/null | while read f; do echo "==== $f ===="; cat "$f"; done
          docker rm "$cid" >/dev/null
