name: build-and-push

# Builds the fast-boot Hunyuan3D 2.1 image and pushes to Docker Hub.
# No local GPU needed; extension compile uses TORCH_CUDA_ARCH_LIST from the Dockerfile.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Image is large (CUDA + torch + comfyui). Reclaim ~25GB so it fits.
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hunyuan3d-21:latest
          provenance: false
