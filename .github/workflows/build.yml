name: build-and-push

# Builds the Hunyuan3D-2.1 image on GitHub's CPU runners (no local GPU needed)
# and pushes to Docker Hub. Trigger: push to main, or run manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Base image is large; reclaim ~25GB on the runner so the pull/build fits.
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hunyuan3d-21:latest
          # No gha cache: base image is bigger than the 10GB cache limit, caching
          # it just thrashes. Our own layer is tiny anyway.
          provenance: false
